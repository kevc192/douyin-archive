<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>抖音作品归档</title>
  <style>
    :root { color-scheme: dark; --page:#111416; --surface:#181d20; --surface-2:#20272b; --line:#30393e; --text:#edf2f3; --muted:#97a5a9; --green:#40c997; --green-soft:#153c31; --amber:#e6a84a; --red:#ed7070; --red-soft:#482326; --blue:#79b8ff; font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif; }
    * { box-sizing:border-box; } body { margin:0; background:var(--page); color:var(--text); font-size:14px; letter-spacing:0; } button,input { font:inherit; letter-spacing:0; }
    .shell { width:min(1320px,calc(100% - 40px)); margin:0 auto; padding:28px 0 48px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:20px; padding-bottom:24px; border-bottom:1px solid var(--line); }
    .brand { display:flex; align-items:center; gap:12px; } .brand-mark { width:34px; height:34px; display:grid; place-items:center; background:var(--green); color:#082118; border-radius:6px; font-weight:800; font-size:16px; } .brand h1 { margin:0; font-size:20px; font-weight:650; } .brand p { margin:3px 0 0; color:var(--muted); font-size:12px; }
    .session { display:flex; align-items:center; gap:8px; color:var(--muted); white-space:nowrap; } .dot { width:8px; height:8px; border-radius:50%; background:var(--red); box-shadow:0 0 0 3px rgba(237,112,112,.11); } .session.online .dot { background:var(--green); box-shadow:0 0 0 3px rgba(64,201,151,.12); } .session strong { color:var(--text); font-weight:600; }
    .overview { display:grid; grid-template-columns:1.5fr repeat(3,1fr); gap:12px; margin:22px 0; } .metric { min-height:92px; padding:16px; border:1px solid var(--line); background:var(--surface); border-radius:7px; } .metric.primary { border-color:#285243; background:#17241f; } .metric-label { color:var(--muted); font-size:12px; } .metric-value { margin-top:9px; font-size:22px; font-weight:650; } .metric-detail { margin-top:5px; color:var(--muted); font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .workspace { display:grid; grid-template-columns:minmax(0,1.45fr) minmax(320px,.9fr); gap:18px; align-items:start; } .stack { display:grid; gap:18px; }
    .panel { background:var(--surface); border:1px solid var(--line); border-radius:7px; } .panel-head { display:flex; align-items:start; justify-content:space-between; gap:16px; padding:18px 18px 14px; border-bottom:1px solid var(--line); } .panel-title { margin:0; font-size:15px; font-weight:650; } .panel-copy { margin:5px 0 0; color:var(--muted); font-size:12px; line-height:1.5; }
    .panel-body { padding:18px; } .form-grid { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:10px; } .subscription-form { grid-template-columns:minmax(0,1fr) minmax(150px,.4fr) auto; }
    input { height:40px; min-width:0; color:var(--text); background:#121719; border:1px solid #3b464b; border-radius:5px; padding:0 12px; outline:none; } input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(64,201,151,.12); } input::placeholder { color:#718084; }
    button { height:40px; border:1px solid transparent; border-radius:5px; padding:0 14px; color:#071d16; background:var(--green); font-weight:650; cursor:pointer; white-space:nowrap; } button:hover { filter:brightness(1.06); } button:disabled { cursor:not-allowed; opacity:.55; } button.secondary { color:var(--text); background:transparent; border-color:#485459; } button.secondary:hover { background:#252d31; } button.danger { color:#ffd9d9; border-color:#6f3d40; }
    .notice { min-height:20px; padding-top:10px; color:var(--muted); font-size:12px; } .notice.success { color:var(--green); } .notice.error { color:#ff9999; }
    .state-list { display:grid; gap:0; } .state-row { display:flex; align-items:center; gap:11px; min-height:56px; padding:10px 0; border-bottom:1px solid #2b3438; } .state-row:last-child { border-bottom:0; } .state-icon { width:28px; height:28px; display:grid; place-items:center; flex:0 0 auto; border-radius:5px; color:var(--green); background:var(--green-soft); font-size:12px; font-weight:700; } .state-icon.warning { background:#402f17; color:var(--amber); } .state-copy { min-width:0; flex:1; } .state-name { color:var(--text); font-weight:600; font-size:13px; } .state-detail { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:3px; color:var(--muted); font-size:12px; } .state-value { color:var(--muted); font-size:12px; text-align:right; }
    .list { padding:0 18px; } .item { display:grid; grid-template-columns:minmax(0,1fr) auto; gap:16px; align-items:center; padding:14px 0; border-bottom:1px solid #2b3438; } .item:last-child { border-bottom:0; } .item-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:600; } .item-meta { display:flex; align-items:center; gap:8px; min-width:0; margin-top:5px; color:var(--muted); font-size:12px; } .url { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; } .actions { display:flex; gap:7px; } .actions button { height:32px; padding:0 10px; font-size:12px; }
    .badge { display:inline-flex; align-items:center; height:20px; padding:0 7px; border-radius:10px; font-size:11px; font-weight:650; flex:0 0 auto; } .badge.completed { color:#89e6bc; background:var(--green-soft); } .badge.running,.badge.queued { color:#a9d4ff; background:#19354a; } .badge.failed { color:#ffadad; background:var(--red-soft); } .badge.paused { color:#e3c58c; background:#3b2f1d; }
    .empty { padding:28px 0; color:var(--muted); text-align:center; font-size:13px; } .task-count { color:var(--muted); font-size:12px; } .schedule { color:var(--muted); font-size:12px; }
    @media (max-width:900px) { .overview { grid-template-columns:repeat(2,1fr); } .overview .primary { grid-column:span 2; } .workspace { grid-template-columns:1fr; } }
    @media (max-width:620px) { .shell { width:calc(100% - 24px); padding-top:18px; } .topbar { align-items:flex-start; } .session { align-items:flex-end; flex-direction:column; gap:4px; } .overview { grid-template-columns:1fr 1fr; gap:8px; } .metric { min-height:78px; padding:13px; } .metric.primary { grid-column:span 2; } .workspace { grid-template-columns:minmax(0,1fr) !important; width:100% !important; } .form-grid,.subscription-form { grid-template-columns:minmax(0,1fr) !important; width:100% !important; } button { width:100%; } .item { grid-template-columns:minmax(0,1fr) !important; gap:10px; } .actions { width:100%; } .actions button { flex:1; } }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar"><div class="brand"><div class="brand-mark">DA</div><div><h1>抖音作品归档</h1><p>个人作品追更与本地归档</p></div></div><div id="session" class="session"><span class="dot"></span><strong>Chrome 会话</strong><span id="session-text">检查中</span></div></header>
    <section class="overview" aria-label="归档状态"><div class="metric primary"><div class="metric-label">当前运行</div><div id="active-run" class="metric-value">--</div><div id="active-detail" class="metric-detail">正在读取任务队列</div></div><div class="metric"><div class="metric-label">追更订阅</div><div id="subscription-count" class="metric-value">0</div><div class="metric-detail">已保存作者</div></div><div class="metric"><div class="metric-label">最近新增</div><div id="download-count" class="metric-value">0</div><div class="metric-detail">最近任务统计</div></div><div class="metric"><div class="metric-label">同步周期</div><div id="schedule" class="metric-value">--</div><div class="metric-detail">Cron 计划</div></div></section>
    <section class="workspace"><div class="stack"><article class="panel"><div class="panel-head"><div><h2 class="panel-title">立即归档</h2><p class="panel-copy">输入作者主页链接或 sec_uid，加入完整作品归档队列。</p></div></div><div class="panel-body"><form id="archive" class="form-grid"><input name="profile_url" required placeholder="抖音作者主页链接或 sec_uid" autocomplete="off"><button>加入队列</button></form><div id="notice" class="notice" role="status"></div></div></article><article class="panel"><div class="panel-head"><div><h2 class="panel-title">追更订阅</h2><p class="panel-copy">订阅会在设定周期内检查新作品，并自动跳过已归档内容。</p></div><span id="schedule-copy" class="schedule"></span></div><div class="panel-body"><form id="subscribe" class="form-grid subscription-form"><input name="profile_url" required placeholder="抖音作者主页链接或 sec_uid" autocomplete="off"><input name="label" placeholder="作者备注"><button>添加订阅</button></form></div></article><article class="panel"><div class="panel-head"><h2 class="panel-title">订阅列表</h2><span id="subscription-label" class="task-count"></span></div><div id="subscriptions" class="list"></div></article></div><aside class="stack"><article class="panel"><div class="panel-head"><div><h2 class="panel-title">运行环境</h2><p class="panel-copy">自动同步依赖已连接的 Chrome 会话。</p></div></div><div class="panel-body"><div class="state-list"><div class="state-row"><div id="chrome-icon" class="state-icon">C</div><div class="state-copy"><div class="state-name">Chrome 会话</div><div id="chrome-detail" class="state-detail">正在检查连接</div></div><div id="chrome-value" class="state-value">--</div></div><div class="state-row"><div class="state-icon">Q</div><div class="state-copy"><div class="state-name">任务队列</div><div id="queue-detail" class="state-detail">正在读取</div></div><div id="queue-value" class="state-value">--</div></div><div class="state-row"><div class="state-icon">S</div><div class="state-copy"><div class="state-name">定时同步</div><div class="state-detail">订阅作者按周期入队</div></div><div id="sync-value" class="state-value">--</div></div></div></div></article><article class="panel"><div class="panel-head"><h2 class="panel-title">最近任务</h2><span id="run-label" class="task-count"></span></div><div id="runs" class="list"></div></article></aside></section>
  </main>
  <script>
    const el = id => document.getElementById(id); const notice = el('notice');
    const stateText = {completed:'已完成', running:'进行中', queued:'排队中', failed:'失败'};
    const escapeHtml = value => String(value ?? '').replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[char]));
    const compactUrl = value => escapeHtml(value).replace(/^https:\/\/www\.douyin\.com\//, 'douyin.com/');
    const time = value => value ? new Date(value + 'Z').toLocaleString('zh-CN', {hour12:false, month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'}) : '--';
    const cronText = value => value === '15 */6 * * *' ? '每 6 小时' : value || '--';
    async function api(path, options) { const response = await fetch(path, options); if (!response.ok) throw new Error((await response.text()).replace(/^"|"$/g,'')); return response.json(); }
    function setNotice(message, type='') { notice.textContent = message; notice.className = `notice ${type}`; }
    function renderSubscriptions(subs) { el('subscription-count').textContent = subs.length; el('subscription-label').textContent = `${subs.length} 位作者`; el('subscriptions').innerHTML = subs.length ? subs.map(sub => `<div class="item"><div><div class="item-name">${escapeHtml(sub.label || '未命名作者')}</div><div class="item-meta"><span class="badge ${sub.enabled ? 'completed' : 'paused'}">${sub.enabled ? '已启用' : '已暂停'}</span><span class="url">${compactUrl(sub.profile_url)}</span></div></div><div class="actions"><button class="secondary" data-sync="${sub.id}">同步</button><button class="secondary" data-toggle="${sub.id}">${sub.enabled ? '暂停' : '启用'}</button></div></div>`).join('') : '<div class="empty">尚未添加追更作者</div>'; }
    function renderRuns(runs) { const active = runs.find(run => run.status === 'running' || run.status === 'queued'); const completed = runs.find(run => run.status === 'completed'); const queued = runs.filter(run => run.status === 'running' || run.status === 'queued').length; el('active-run').textContent = active ? stateText[active.status] : '队列空闲'; el('active-detail').textContent = active ? compactUrl(active.source_url).replace(/&amp;/g,'&') : '等待新的归档任务'; el('download-count').textContent = completed?.downloaded_count ?? 0; el('queue-detail').textContent = queued ? `${queued} 个任务正在等待或执行` : '没有待处理任务'; el('queue-value').textContent = queued ? `${queued} 项` : '空闲'; el('run-label').textContent = `最近 ${runs.length} 项`; el('runs').innerHTML = runs.length ? runs.slice(0,8).map(run => `<div class="item"><div><div class="item-name">${compactUrl(run.source_url)}</div><div class="item-meta"><span class="badge ${run.status}">${stateText[run.status] || run.status}</span><span>${time(run.completed_at || run.started_at)}</span></div>${run.message ? `<div class="item-meta">${escapeHtml(run.message)}</div>` : ''}</div><div class="task-count">新增 ${run.downloaded_count}</div></div>`).join('') : '<div class="empty">尚无归档任务</div>'; }
    function renderBrowser(browser) { const connected = browser.connected; el('session').classList.toggle('online', connected); el('session-text').textContent = connected ? `${browser.pages} 个页面` : '未连接'; el('chrome-icon').className = `state-icon ${connected ? '' : 'warning'}`; el('chrome-detail').textContent = connected ? '已连接到本机登录会话' : (browser.message || '请启动已登录的 Chrome'); el('chrome-value').textContent = connected ? '在线' : '离线'; }
    async function refresh() { try { const [subs,runs,browser] = await Promise.all([api('/api/subscriptions'),api('/api/runs'),api('/api/browser')]); const config = await api('/api/config').catch(() => ({sync_cron:'15 */6 * * *'})); renderSubscriptions(subs); renderRuns(runs); renderBrowser(browser); const schedule = cronText(config.sync_cron); el('schedule').textContent = schedule; el('schedule-copy').textContent = schedule; el('sync-value').textContent = schedule; } catch (error) { setNotice(`无法读取服务状态：${error.message}`, 'error'); } }
    document.addEventListener('click', async event => { const syncId = event.target.dataset.sync; const toggleId = event.target.dataset.toggle; if (!syncId && !toggleId) return; event.target.disabled = true; try { if (syncId) { await api(`/api/subscriptions/${syncId}/sync`, {method:'POST'}); setNotice('同步任务已加入队列', 'success'); } else { await api(`/api/subscriptions/${toggleId}/toggle`, {method:'PATCH'}); } await refresh(); } catch (error) { setNotice(`操作失败：${error.message}`, 'error'); } finally { event.target.disabled = false; } });
    [['archive','/api/archive','归档任务已加入队列'],['subscribe','/api/subscriptions','追更订阅已添加']].forEach(([id,path,success]) => { el(id).addEventListener('submit', async event => { event.preventDefault(); const button = event.currentTarget.querySelector('button'); button.disabled = true; try { await api(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(event.currentTarget)))}); event.currentTarget.reset(); setNotice(success,'success'); await refresh(); } catch (error) { setNotice(`操作失败：${error.message}`,'error'); } finally { button.disabled = false; } }); });
    refresh(); window.setInterval(refresh, 5000);
  </script>
</body></html>
